# Applied to the dashboard's dedicated tmux server (socket: tmuxdash) via `tmux -f`.
# Goal: make an attached client render like a plain full-screen terminal so TUIs
# (claude, vim, htop, …) display correctly in the browser xterm.

# No status bar: don't steal a row and don't paint tmux chrome into the browser.
set -g status off

# Respond to ESC immediately — the default 500ms delay garbles TUI key handling.
set -g escape-time 10

# 256-color base term + 24-bit truecolor passthrough to inner programs.
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# Forward apps' OSC 52 clipboard writes (e.g. claude's copy-on-select) out to the
# browser terminal; advertising the clipboard feature makes tmux pass them through
# instead of only capturing them into its own buffer. xterm's clipboard addon then
# writes the system clipboard.
set -g set-clipboard on
set -as terminal-features ",*:clipboard"

# Size each window to the attached viewer (not the smallest in the session group).
setw -g aggressive-resize on
set -g window-size latest

# Keep windows alive when their viewer detaches; reasonable scrollback.
set -g destroy-unattached off
set -g history-limit 10000
